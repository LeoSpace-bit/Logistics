{% extends "base.html" %}
{% block title %}Новый заказ{% endblock %}

{% block content %}
<h2 class="mb-4">Создание заказа</h2>

<form method="post">
    <div class="row g-4">

        <!-- Маршрут -->
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">🗺️ Маршрут</div>
                <div class="card-body">
                    <div class="mb-3">
                        <label class="form-label">Откуда *</label>
                        <select name="origin_id" class="form-select" required>
                            <option value="">Выберите пункт</option>
                            {% for loc in locations %}
                            <option value="{{ loc.id }}">{{ loc.name }} ({{ loc.type }})</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Куда *</label>
                        <select name="dest_id" class="form-select" required>
                            <option value="">Выберите пункт</option>
                            {% for loc in locations %}
                            <option value="{{ loc.id }}">{{ loc.name }} ({{ loc.type }})</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-0">
                        <label class="form-label">Стратегия маршрута</label>
                        <select name="strategy" class="form-select">
                            <option value="cheapest">💰 Самый дешёвый</option>
                            <option value="fastest">⚡ Самый быстрый</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>

        <!-- Груз -->
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">📦 Груз</div>
                <div class="card-body">
                    <div class="mb-3">
                        <label class="form-label">Вес (кг) *</label>
                        <input type="number" name="weight_kg" class="form-control"
                               step="0.01" min="0.01" required placeholder="10.0">
                    </div>
                    <div class="row g-2">
                        <div class="col-4">
                            <label class="form-label">Высота (м) *</label>
                            <input type="number" name="height_m" class="form-control"
                                   step="0.01" min="0.01" required placeholder="0.5">
                        </div>
                        <div class="col-4">
                            <label class="form-label">Ширина (м) *</label>
                            <input type="number" name="width_m" class="form-control"
                                   step="0.01" min="0.01" required placeholder="0.4">
                        </div>
                        <div class="col-4">
                            <label class="form-label">Длина (м) *</label>
                            <input type="number" name="length_m" class="form-control"
                                   step="0.01" min="0.01" required placeholder="0.3">
                        </div>
                    </div>
                    <div class="mt-3">
                        <label class="form-label">Описание</label>
                        <input type="text" name="description" class="form-control"
                               placeholder="Книги, электроника…">
                    </div>
                </div>
            </div>
        </div>

        <!-- Категории -->
        <div class="col-12">
            <div class="card">
                <div class="card-header">⚠️ Категории груза</div>
                <div class="card-body">
                    <div class="row g-3">
                        <div class="col-md-4">
                            <div class="form-check">
                                <input type="checkbox" name="is_fragile" class="form-check-input" id="fragile">
                                <label class="form-check-label" for="fragile">🔮 Хрупкий</label>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="form-check">
                                <input type="checkbox" name="is_dangerous" class="form-check-input" id="dangerous">
                                <label class="form-check-label" for="dangerous">☢️ Опасный</label>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="form-check">
                                <input type="checkbox" name="is_liquid" class="form-check-input" id="liquid">
                                <label class="form-check-label" for="liquid">💧 Жидкость</label>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="form-check">
                                <input type="checkbox" name="is_perishable" class="form-check-input" id="perishable">
                                <label class="form-check-label" for="perishable">🧊 Скоропортящийся</label>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="form-check">
                                <input type="checkbox" name="is_crushable" class="form-check-input" id="crushable">
                                <label class="form-check-label" for="crushable">📎 Мнущийся</label>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="form-check">
                                <input type="checkbox" name="req_temp_control" class="form-check-input" id="temp">
                                <label class="form-check-label" for="temp">🌡️ Тем. контроль</label>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <div class="mt-4">
        <button type="submit" class="btn btn-primary btn-lg">Создать заказ</button>
        <a href="{{ url_for('dashboard') }}" class="btn btn-outline-secondary btn-lg ms-2">Отмена</a>
    </div>
</form>
{% endblock %}
