{% extends "base.html" %}
{% block title %}Вход{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card">
            <div class="card-header text-center">Вход в систему</div>
            <div class="card-body">
                <form method="post">
                    <div class="mb-3">
                        <label class="form-label">Логин</label>
                        <input type="text" name="login" class="form-control"
                               required autofocus placeholder="Введите логин">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Пароль</label>
                        <input type="password" name="password" class="form-control"
                               required placeholder="Введите пароль">
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Войти</button>
                </form>
                <hr>
                <p class="text-center text-muted mb-0">
                    Нет аккаунта? <a href="{{ url_for('register') }}">Зарегистрироваться</a>
                </p>
            </div>
        </div>
        <div class="card mt-3">
            <div class="card-body">
                <small class="text-muted">
                    <strong>Демо-аккаунты:</strong><br>
                    Клиент: <code>client1</code> / <code>client1</code><br>
                    Менеджер: <code>manager</code> / <code>manager</code><br>
                    Админ: <code>admin</code> / <code>admin</code>
                </small>
            </div>
        </div>
    </div>
</div>
{% endblock %}
